name = "arty-growth-orchestrator"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# CPU time limit max sur Standard plan (5 min). Necessaire car le DG peut prendre
# 30s-2min pour une question ad-hoc, et 5-10min pour un cycle hebdo complet.
# Le defaut Cloudflare est 30s, ce qui faisait timeout les /dg.
# Necessite plan Workers Paid (5$/mois) - non supporte sur Free.
[limits]
cpu_ms = 300000

# Crons :
#  - dimanche 18h UTC : cycle hebdo growth (3 sous-agents + DG).
#    Le digest est lu par Florent le lundi matin.
#  - mercredi 12h UTC : veille outils/infra (7 watchers, slot wed).
#  - jeudi    12h UTC : veille marche & voix users (2 watchers, slot thu).
#  - vendredi 12h UTC : veille recherche docs/tutos (1 watcher, slot fri).
#  - samedi   12h UTC : meta-digest du manager de l'equipe veille (slot sat).
# Le dispatch se fait dans `scheduled` sur `event.cron` ; chaque cron filtre
# WATCHERS_CONFIG par cycleSlot. Quatre digests Discord distincts (titres clairs)
# au lieu d'un mur de 10 sections.
# Note : Cloudflare exige le day-of-week en nom court (SUN/WED/THU/FRI/SAT).
[triggers]
crons = ["0 18 * * SUN", "0 12 * * WED", "0 12 * * THU", "0 12 * * FRI", "0 12 * * SAT"]

# Logs : conserver les invocations pour debug
[observability]
enabled = true

# Variables non secretes uniquement. Les 10 secrets sont configures via
# `wrangler secret put <NOM>` (voir README, section Setup) :
#   ANTHROPIC_API_KEY            cle API Anthropic Console
#   ANTHROPIC_WEBHOOK_SIGNING_KEY  cle de signature du webhook (whsec_...)
#   TRIGGER_SECRET               protege /trigger, /admin/*, /oauth/google/start
#   MCP_AUTH_TOKEN               protege /mcp/gmail (header Authorization: Bearer)
#   DISCORD_BOT_TOKEN            token du bot Discord
#   TALLY_API_KEY                cle API Tally (waitlist)
#   GITHUB_TOKEN                 PAT fine-grained, repo flotellop-art/Arty, Contents:Read
#   GOOGLE_CLIENT_ID             OAuth client id (Gmail)
#   GOOGLE_CLIENT_SECRET         OAuth client secret (Gmail)
#   RESEND_API_KEY               (optionnel) Resend pour envoi des emails recap
#                                 vulgarises. Vide = pas d'email, seulement Discord.
[vars]
# IDs des agents managed sur platform.claude.com (workspace Appfacade)
AGENT_DG_ID = "agent_01USsT8aHKqp1t2nBWAj9KCE"
AGENT_GROWTH_FR_ID = "agent_01GxjQaNBVXQ6nJcUr4LTSLC"
AGENT_CONTENT_FR_ID = "agent_01Et2rx4MCjVmBwzYBVGBDC8"
AGENT_ANALYTICS_ID = "agent_01XRvTLBdHLWmn8WNvV2TbY8"

# Agents de veille (10 au total, repartis sur 4 crons). A creer sur la console
# Anthropic avec les system prompts dans `agents/watcher-*.md`, puis coller les
# agent_id ici. Tant que vides, runWatchCycle logge une erreur et skip le
# watcher concerne (les autres tournent normalement).
#
# Mercredi (outils/infra) :
AGENT_WATCHER_MCP_TUNNELS_ID = "agent_01FWfua4dvsxGGVRhWR7oKxR"
AGENT_WATCHER_SHS_ID = "agent_01FsMVxwRVESAGHXXsqZMyp1"
AGENT_WATCHER_AI_MODELS_ID = "agent_013DvHUFoUkJQAFQtaT4U8Z8"
AGENT_WATCHER_CLOUDFLARE_ID = "agent_014wzrVpfmW35GvWDGYEUVYS"
AGENT_WATCHER_GOOGLE_APIS_ID = "agent_012cSpB9mhSC3EWLwDkNnZdE"
AGENT_WATCHER_MOBILE_ID = "agent_01Vm9Trhod74SdEZRxX6636c"
AGENT_WATCHER_COMMS_ID = "agent_01GayJpJdHbYtebCq1TbAKt8"
# Jeudi (marche & voix users) :
AGENT_WATCHER_MARKET_ID = "agent_015DacHSjpCzkegDXXD7TMC5"
AGENT_WATCHER_USERS_VOICE_ID = "agent_012Tg5cXStAgFfSwvBjjo9st"
# Vendredi (recherche docs/tutos) :
AGENT_WATCHER_RESEARCH_ID = "agent_01PFhgq2U9kHHbzUrQ4o9ECe"
# Samedi (meta-digest manager) :
AGENT_WATCHER_MANAGER_ID = "agent_0138FMUj2wjqLZPx79prnWyR"
# Workspace + environment ids (confirmes via GET /v1/environments)
# Le workspace est implicite via l'API key, on garde l'ID pour debug.
ANTHROPIC_WORKSPACE_ID = "wrkspc_01H3ruuiyXxKTdN1DGELBeDi"
ANTHROPIC_ENV_ID = "env_0171H3zqE4PaL95poNDMP7kv"

# Memory store partage entre les 4 agents (DG + 3 sub-agents)
# Monte dans le container a /mnt/memory/arty/ (= name du store)
# Cree le 17/05/2026, contient le contexte, l historique, les decisions, l outreach.
MEMORY_STORE_ID = "memstore_01GuxXQSHxzxKQCMCpJtP8ss"
MEMORY_STORE_NAME = "arty"

# Discord (IDs publics, non sensibles)
DISCORD_APPLICATION_ID = "1505556745463009460"
DISCORD_PUBLIC_KEY = "c397a287d99e703b174ce8b438445fdee25e8a91bc6ff629a7b6a199b1ae6281"
DISCORD_GUILD_ID = "1505556266724884510"
DISCORD_CHANNEL_ID = "1505556448468406352"

# Allowlist des IDs utilisateur Discord autorises a lancer /dg (CSV).
# Un ID Discord n'est pas un secret. Mettre ici l'ID de Florent (et tout
# co-equipier autorise). Pour recuperer un ID : Discord > Parametres >
# Avance > Mode developpeur, puis clic droit sur l'utilisateur > Copier l'ID.
DISCORD_ALLOWED_USER_IDS = ""

# Emails recap (apres chaque digest Discord, Haiku traduit en francais simple
# et Resend envoie). Si RESEND_API_KEY est vide, l'envoi est skip sans erreur.
# EMAIL_FROM : pour demarrer utilise `onboarding@resend.dev` (sandbox Resend,
# zero config DNS). Pour envoyer depuis `digest@tryarty.com`, valider le
# domaine `tryarty.com` dans Resend (3 entrees DNS chez Cloudflare).
EMAIL_TO = "flotellop@gmail.com"
EMAIL_FROM = "onboarding@resend.dev"
EMAIL_FROM_NAME = "Arty Veille"

# Tally : formulaire waitlist "Arty - Waitlist"
# Public URL : https://tally.so/r/LZaY01
# API key : secret TALLY_API_KEY
TALLY_FORM_ID = "LZaY01"

# Repo GitHub Arty (prive). Le DG l'a en mount dans /workspace/arty/ a chaque session.
# PAT : secret GITHUB_TOKEN (fine-grained, repo flotellop-art/Arty, Contents:Read)
GITHUB_REPO_URL = "https://github.com/flotellop-art/Arty"
GITHUB_REPO_MOUNT = "/workspace/arty"

# KV namespace : sessions Anthropic en attente + etat des cycles hebdo.
# On y stocke `sess:{id}` -> {type, role, ...} (TTL 14 min pour les /dg ad-hoc,
# 24h pour le flow hebdo) et les cles `cycle:{id}:*`. Quand Anthropic ping le
# webhook (session.status_idled), on retrouve l'entree et on livre sur Discord.
[[kv_namespaces]]
binding = "INTERACTIONS"
id = "fd0e1b08577b4399b88f1cfa6f0db920"
