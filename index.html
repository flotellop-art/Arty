<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF3E7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Arty — Assistant IA personnel" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Lora:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>Arty</title>
    <link rel="canonical" href="https://tryarty.com/" />
    <link rel="canonical" href="https://tryarty.com/" />
  </head>
  <body>
    <!-- Pre-launch waitlist banner.
         Affiche uniquement en mode web (pas Capacitor native), au-dessus de l'app preview.
         Permet aux visiteurs de tryarty.com de rejoindre la waitlist depuis l'app preview.
         Sera retire au lancement public juillet 2026. -->
    <style>
      #arty-prelaunch-banner {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 9999;
        background: #0D0D0D;
        color: #FAF3E7;
        padding: calc(10px + env(safe-area-inset-top, 0px)) 48px 10px 16px;
        text-align: center;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 14px;
        line-height: 1.4;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        display: none;
      }
      #arty-prelaunch-banner a {
        color: #C85A28;
        font-weight: 600;
        text-decoration: none;
        margin-left: 6px;
        white-space: nowrap;
      }
      #arty-prelaunch-banner a:hover { text-decoration: underline; }
      #arty-prelaunch-banner-close {
        position: absolute;
        right: 10px;
        top: calc(50% + env(safe-area-inset-top, 0px) / 2);
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #FAF3E7;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
        padding: 4px 8px;
        opacity: 0.6;
      }
      #arty-prelaunch-banner-close:hover { opacity: 1; }
      body.arty-banner-visible #root {
        padding-top: calc(44px + env(safe-area-inset-top, 0px));
      }
    </style>
    <div id="arty-prelaunch-banner" role="region" aria-label="Annonce pre-launch Arty">
      Arty arrive en juillet.
      <a href="/waitlist">Rejoindre la waitlist →</a>
      <button id="arty-prelaunch-banner-close" aria-label="Fermer">×</button>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Bandeau pre-launch : script externe (CSP refuse inline). -->
    <script src="/arty-banner.js"></script>
    <script>
      // Skip SW registration on Capacitor native — the SW persists across APK
      // updates and serves stale JS/CSS, forcing users to clear app data.
      // See BUG 45 in CLAUDE.md.
      var isCapacitorNative =
        (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform() === true)
        || (location.protocol === 'https:' && location.hostname === 'localhost');
      // Previews Cloudflare Pages (*.appfacade.pages.dev) : NE PAS garder de
      // Service Worker. Le SW (assets cache-first) servait du JS périmé aux
      // testeurs à chaque déploiement (BUG 45) sans moyen de s'en défaire. On le
      // purge ACTIVEMENT (désenregistrement + suppression des caches arty-cache-*)
      // puis on recharge UNE fois pour repartir sur le build frais. L'index.html
      // étant servi network-first par le SW, ce script atteint le testeur même
      // quand le JS bundle est périmé. La prod (tryarty.com) garde son SW (PWA).
      var isPreview = location.hostname.endsWith('.appfacade.pages.dev');
      if (isPreview && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          if (!regs.length) return;
          Promise.all(regs.map((r) => r.unregister()))
            .then(() => (window.caches && caches.keys ? caches.keys() : Promise.resolve([])))
            .then((keys) => Promise.all(keys.map((k) => (k.indexOf('arty-cache-') === 0 ? caches.delete(k) : null))))
            .then(() => {
              try {
                if (!sessionStorage.getItem('sw-purged')) {
                  sessionStorage.setItem('sw-purged', '1');
                  location.reload();
                }
              } catch (e) { location.reload(); }
            });
        }).catch(() => {});
      } else if ('serviceWorker' in navigator && !isCapacitorNative) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
