<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FAF3E7" />
<title>Merci — Arty</title>
<meta name="description" content="C'est noté. Tu seras prévenu·e au lancement d'Arty en juillet 2026." />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF3E7;
    --ink: #0D0D0D;
    --orange: #C85A28;
    --muted: #6B6B6B;
    --line: #E5DED0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { background: var(--cream); color: var(--ink); font-family: 'Instrument Sans', system-ui, sans-serif; }
  body { min-height: 100vh; display: flex; flex-direction: column; }
  .page { max-width: 640px; margin: 0 auto; padding: 96px 32px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .badge { display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 32px; }
  .badge::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--orange); }
  h1 { font-family: 'Instrument Sans', sans-serif; font-weight: 700; font-size: clamp(40px, 7vw, 64px); line-height: 1.05; letter-spacing: -0.025em; margin-bottom: 28px; }
  h1 .accent { color: var(--orange); }
  .lede { font-size: clamp(18px, 2.2vw, 22px); line-height: 1.5; color: var(--ink); margin-bottom: 16px; max-width: 560px; }
  .lede.muted { color: var(--muted); }
  .lede em { font-family: 'Instrument Serif', serif; font-style: italic; }
  .actions { margin-top: 48px; display: flex; gap: 16px; flex-wrap: wrap; }
  .actions a { display: inline-block; padding: 14px 22px; font-size: 16px; font-weight: 700; text-decoration: none; border-radius: 6px; transition: background .15s, color .15s; }
  .actions .primary { background: var(--ink); color: var(--cream); }
  .actions .primary:hover { background: var(--orange); }
  .footer { font-size: 13px; color: var(--muted); padding: 32px; text-align: center; border-top: 1px solid var(--line); }
  .footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>
  <main class="page">
    <div class="badge">C'est noté</div>

    <h1>Merci.<br/><span class="accent">À bientôt en juillet.</span></h1>

    <p class="lede">Tu recevras un mail le jour du lancement.</p>
    <p class="lede muted">D'ici là, je t'enverrai peut-être <em>1 ou 2 mails courts</em> pour te dire où on en est. Pas plus, promis.</p>

    <div class="actions">
      <a href="/" class="primary">Retour à tryarty.com</a>
    </div>
  </main>

  <footer class="footer">
    Construit en France par <a href="https://tryarty.com">Florent Pollet</a>, solo founder
  </footer>
</body>
</html>
