name: Build & distribute APK to Firebase

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notes pour les testeurs (sinon = dernier commit)'
        required: false
        default: ''
      groups:
        description: 'Groupe(s) Firebase (séparés par virgule)'
        required: false
        default: 'beta-testers'

concurrency:
  group: firebase-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets (Vite + tsc)
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      # JCenter a fermé en 2021 ; le plugin capacitor-google-auth déclare encore
      # `jcenter()`, ce qui provoque un timeout réseau aléatoire qui casse le
      # build quand le cache Gradle est froid. Les artefacts requis (AGP,
      # google-services) sont sur google()/mavenCentral(), toujours déclarés —
      # on retire juste le dépôt mort pour qu'il ne soit jamais interrogé.
      - name: Strip defunct JCenter from plugins
        run: |
          grep -rl 'jcenter()' node_modules android --include=build.gradle 2>/dev/null | xargs -r sed -i '/jcenter()/d' || true

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode --ignore-garbage > android/app/google-services.json
          test -s android/app/google-services.json

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode --ignore-garbage > android/app/arty-release.keystore
          test -s android/app/arty-release.keystore

      - name: Write release notes
        id: notes
        run: |
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="$(git log -1 --pretty=%s)"
          fi
          printf '%s\n' "$NOTES" > android/app/release-notes.txt
          {
            echo "notes<<__END__"
            cat android/app/release-notes.txt
            echo "__END__"
          } >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        working-directory: android
        env:
          ARTY_KEYSTORE_PATH: ${{ github.workspace }}/android/app/arty-release.keystore
          ARTY_KEYSTORE_PASSWORD: ${{ secrets.ARTY_KEYSTORE_PASSWORD }}
          ARTY_KEY_ALIAS: ${{ secrets.ARTY_KEY_ALIAS }}
          ARTY_KEY_PASSWORD: ${{ secrets.ARTY_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ github.event.inputs.groups || 'beta-testers' }}
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: ${{ steps.notes.outputs.notes }}

      - name: Cleanup secret files
        if: always()
        run: |
          rm -f android/app/arty-release.keystore
          rm -f android/app/google-services.json
