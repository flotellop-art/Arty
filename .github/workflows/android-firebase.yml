name: Build & distribute APK to Firebase

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Notes pour les testeurs (sinon = dernier commit)'
        required: false
        default: ''
      groups:
        description: 'Groupe(s) Firebase (séparés par virgule)'
        required: false
        default: 'beta-testers'

permissions:
  contents: read

concurrency:
  group: firebase-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Preview
    env:
      FIREBASE_GROUPS: ${{ inputs.groups || 'beta-testers' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Verify web app and Functions
        run: npm run verify

      # Les tests de parite couvrent aussi le profil legacy et s'executent donc
      # sans flag. Cette seconde build est celle embarquee dans le WebView.
      - name: Build web app with public Google profile
        env:
          VITE_GMAIL_NO_CASA_PHASE0: 'true'
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode --ignore-garbage > android/app/google-services.json
          test -s android/app/google-services.json

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode --ignore-garbage > android/app/arty-release.keystore
          test -s android/app/arty-release.keystore

      - name: Write release notes
        env:
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          if [ -n "$RELEASE_NOTES_INPUT" ]; then
            printf '%s\n' "$RELEASE_NOTES_INPUT" > android/app/release-notes.txt
          else
            git log -1 --pretty=%s > android/app/release-notes.txt
          fi

      - name: Validate Firebase group names
        run: |
          if ! [[ "$FIREBASE_GROUPS" =~ ^[A-Za-z0-9._,-]+$ ]]; then
            echo "Invalid Firebase distribution group list" >&2
            exit 1
          fi

      - name: Build signed release APK
        working-directory: android
        env:
          ARTY_KEYSTORE_PATH: ${{ github.workspace }}/android/app/arty-release.keystore
          ARTY_KEYSTORE_PASSWORD: ${{ secrets.ARTY_KEYSTORE_PASSWORD }}
          ARTY_KEY_ALIAS: ${{ secrets.ARTY_KEY_ALIAS }}
          ARTY_KEY_PASSWORD: ${{ secrets.ARTY_KEY_PASSWORD }}
          # Doit rester aligne avec VITE_GMAIL_NO_CASA_PHASE0 ci-dessus.
          ARTY_GMAIL_NO_CASA_PHASE0: 'true'
        run: ./gradlew :app:lintRelease :app:testReleaseUnitTest :app:assembleRelease --no-daemon

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1.7.1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ env.FIREBASE_GROUPS }}
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotesFile: android/app/release-notes.txt

      - name: Cleanup secret files
        if: always()
        run: |
          rm -f android/app/arty-release.keystore
          rm -f android/app/google-services.json
          rm -f android/app/release-notes.txt
