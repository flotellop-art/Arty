name: Build signed AAB for Play Store

# Déclenchement MANUEL uniquement (onglet Actions → ce workflow → Run workflow).
# Produit l'app-release.aab signé avec le keystore existant (mêmes secrets que
# le workflow Firebase) et le dépose en artifact téléchargeable — le format
# exigé par la Play Console (pistes de test fermé et production).
# ⚠️ RÈGLE 4 (CLAUDE.md) : repasser la checklist publication avant tout envoi
# au Play Store — ce workflow ne publie rien, il ne fait que construire.

on:
  workflow_dispatch:

concurrency:
  group: playstore-aab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets (Vite + tsc)
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      # Même contournement que le workflow Firebase : le plugin
      # capacitor-google-auth déclare encore jcenter() (fermé en 2021).
      - name: Replace defunct JCenter with mavenCentral in plugins
        run: |
          grep -rl 'jcenter()' node_modules android --include=build.gradle 2>/dev/null | xargs -r sed -i 's/jcenter()/mavenCentral()/g' || true

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode --ignore-garbage > android/app/google-services.json
          test -s android/app/google-services.json

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode --ignore-garbage > android/app/arty-release.keystore
          test -s android/app/arty-release.keystore

      - name: Build signed release AAB
        working-directory: android
        env:
          ARTY_KEYSTORE_PATH: ${{ github.workspace }}/android/app/arty-release.keystore
          ARTY_KEYSTORE_PASSWORD: ${{ secrets.ARTY_KEYSTORE_PASSWORD }}
          ARTY_KEY_ALIAS: ${{ secrets.ARTY_KEY_ALIAS }}
          ARTY_KEY_PASSWORD: ${{ secrets.ARTY_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: arty-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      - name: Cleanup secret files
        if: always()
        run: |
          rm -f android/app/arty-release.keystore
          rm -f android/app/google-services.json
