name: Build signed AAB for Play Store

# Déclenchement manuel uniquement. Produit un AAB signé, sans le publier.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playstore-aab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-aab:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Verify web app and Functions
        run: npm run verify

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode --ignore-garbage > android/app/google-services.json
          test -s android/app/google-services.json

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode --ignore-garbage > android/app/arty-release.keystore
          test -s android/app/arty-release.keystore

      - name: Build signed release AAB
        working-directory: android
        env:
          ARTY_KEYSTORE_PATH: ${{ github.workspace }}/android/app/arty-release.keystore
          ARTY_KEYSTORE_PASSWORD: ${{ secrets.ARTY_KEYSTORE_PASSWORD }}
          ARTY_KEY_ALIAS: ${{ secrets.ARTY_KEY_ALIAS }}
          ARTY_KEY_PASSWORD: ${{ secrets.ARTY_KEY_PASSWORD }}
        run: ./gradlew :app:lintRelease :app:testReleaseUnitTest :app:bundleRelease --no-daemon

      # PR-0 (CDC Phase 1 D21/D29) — inspection sémantique de l'AAB signé
      # (pendant release des inspections par-PR de ci.yml, qui portent sur
      # l'APK debug — ce workflow est manuel, il ne gate pas les PRs).
      # NB : l'allowlist de check-android-manifest.mjs a été gelée depuis
      # l'APK DEBUG — si le jeu de permissions release diffère, ce step
      # échouera en loud au premier build : mettre la liste à jour en
      # conscience le cas échéant.
      - name: Inspect AAB manifest permissions
        run: |
          BUNDLETOOL_VERSION=1.17.2
          BUNDLETOOL_SHA256=797b23b1a4b7cbba3ffd7d4bca663200fed9362630d0aa340e8480a3ba8f8052
          curl -sSL -o /tmp/bundletool.jar \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar"
          echo "${BUNDLETOOL_SHA256}  /tmp/bundletool.jar" | sha256sum -c -
          java -jar /tmp/bundletool.jar dump manifest \
            --bundle android/app/build/outputs/bundle/release/app-release.aab > /tmp/aab-manifest.xml
          node scripts/check-android-manifest.mjs /tmp/aab-manifest.xml

      - name: Upload AAB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: arty-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      - name: Cleanup secret files
        if: always()
        run: |
          rm -f android/app/arty-release.keystore
          rm -f android/app/google-services.json
