name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-app:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, test with coverage, and build
        run: npm run verify

  verify-growth-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/growth-orchestrator

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/growth-orchestrator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run typecheck

  verify-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install and sync Android
        run: |
          npm ci
          npm run build
          npx cap sync android
          npm run no-casa:android-check

      - name: Android lint, unit tests, and compile checks
        working-directory: android
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest :app:assembleDebug :app:assembleAndroidTest --no-daemon

      # PR-0 (CDC Phase 1 D21/D29) — inspections sémantiques des artefacts
      # Android, sur les builds DÉJÀ produits par assembleDebug (coût ~0).
      # Inspection 1/3 = scanner source (job verify-app, no-casa:check).
      - name: Inspect merged manifest (2/3)
        run: |
          # -path filtre la variante debug : assembleAndroidTest produit aussi
          # un manifest mergé (debugAndroidTest) au jeu de permissions différent.
          MERGED=$(find android/app/build/intermediates/merged_manifests -path '*/debug/*' -name AndroidManifest.xml | head -1)
          test -n "$MERGED" || { echo "merged manifest debug introuvable"; exit 1; }
          node scripts/check-android-manifest.mjs "$MERGED"

      - name: Inspect assembled APK permissions (3/3)
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name '*.apk' | head -1)
          test -n "$APK" || { echo "APK debug introuvable"; exit 1; }
          AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt | sort | tail -1)
          test -n "$AAPT" || { echo "aapt introuvable dans ANDROID_HOME/build-tools"; exit 1; }
          "$AAPT" dump permissions "$APK" > /tmp/apk-permissions.txt
          node scripts/check-android-manifest.mjs /tmp/apk-permissions.txt
